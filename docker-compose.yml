# ── HawkEye — Docker Compose ────────────────────────────────────────────────
# Orchestration : sniffer + dashboard + CLI
#
# Usage :
#   docker compose up -d                        # Sniffer + Dashboard
#   docker compose up -d sniffer                # Sniffer uniquement
#   docker compose up -d dashboard              # Dashboard uniquement
#   docker compose --profile cli run --rm cli --stats   # CLI one-shot
#   docker compose logs -f                      # Logs en temps réel
#   docker compose down                         # Arrêt

services:
  # ── Sniffer DNS ──────────────────────────────────────────────────────────
  # Capture le trafic DNS en temps réel (démarre par défaut).
  sniffer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hawkeye-sniffer
    command: ["--db", "/data/hawkeye.db", "--export-json"]
    network_mode: "host"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - hawkeye-data:/data
      - ./malicious.txt:/app/malicious.txt:ro
    environment:
      - HAWKEYE_TELEGRAM_TOKEN=${HAWKEYE_TELEGRAM_TOKEN:-}
      - HAWKEYE_TELEGRAM_CHAT_ID=${HAWKEYE_TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    stop_grace_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      disable: true

  # ── Dashboard Web ────────────────────────────────────────────────────────
  # Interface temps réel Flask + Chart.js (démarre par défaut).
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hawkeye-dashboard
    command: ["dashboard", "--host", "0.0.0.0", "--port", "5000", "--db", "/data/hawkeye.db"]
    ports:
      - "5000:5000"
    volumes:
      - hawkeye-data:/data
    restart: unless-stopped
    depends_on:
      sniffer:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── CLI (mode one-shot) ──────────────────────────────────────────────────
  # Ne démarre pas par défaut. Utiliser : docker compose --profile cli run --rm cli --stats
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hawkeye-cli
    profiles:
      - cli
    volumes:
      - hawkeye-data:/data
    command: ["--help"]

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  hawkeye-data:
    name: hawkeye-data

