name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Vérifier le style (flake8)
        run: |
          flake8 hawkeye/ tests/ --max-line-length=100 --exclude=__init__.py

      - name: Lancer les tests
        run: |
          python -m pytest tests/ -v --cov=hawkeye --cov-report=term-missing

      - name: Vérifier que le package s'importe
        run: |
          python -c "from hawkeye import __version__; print(f'HawkEye v{__version__}')"
          python -m hawkeye --help

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Construire l'image Docker
        run: |
          docker build -t hawkeye .
          docker run --rm hawkeye --help
